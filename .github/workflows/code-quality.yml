name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort pylint
    
    - name: Run black (code formatter check)
      run: |
        black --check . --exclude="\.venv|venv|\.eggs" || true
      continue-on-error: true
    
    - name: Run isort (import sorting check)
      run: |
        isort --check-only . --skip=".venv" --skip="venv" || true
      continue-on-error: true
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=".venv,venv,.eggs"
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=".venv,venv,.eggs"
    
    - name: Run pylint
      run: |
        find . -name "*.py" -path "*/src/*" -o -path "*/llm4crs/*" | xargs pylint --disable=all --enable=E || true
      continue-on-error: true
